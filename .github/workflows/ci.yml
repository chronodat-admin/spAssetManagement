name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install Python asset dependencies
        run: python -m pip install pillow

      - name: Lint
        run: npm run lint

      - name: Verify version and display name
        run: npm run verify:version; npm run verify:display-name

      - name: Generate package and store assets
        run: npm run assets:sppkg; npm run assets:marketing:crops

      - name: Verify store assets
        run: npm run verify:store

      - name: Build and run script tests
        run: npm test
